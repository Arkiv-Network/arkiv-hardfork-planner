services:
  protocol-schedule:
    build: .
    image: arkiv-hardfork-planner
    container_name: arkiv-pos-protocol-schedule
    ports:
      - "${PROTOCOL_SCHEDULE_PORT:-28882}:28882"
    environment:
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "28882"
      HTML_TITLE: ${HTML_TITLE:-Atlas Hardfork Planner}
      SCHEDULE_PATH: /data/arkiv-protocol-schedule.json
      CHAIN_ID: "42069"
      RPC_URL: ${RPC_URL:-http://reth:8545}
      RPC_STARTUP_MODE: deferred
      RPC_POLL_SECONDS: "10"
      RPC_TIMEOUT_MS: "5000"
      # Protect the admin (fork planning) API. Leave unset to disable writes:
      ADMIN_BEARER_KEY: ${ADMIN_BEARER_KEY:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - atlas

networks:
  atlas:
    name: atlas
    external: true
